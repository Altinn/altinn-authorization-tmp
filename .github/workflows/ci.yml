name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read # the per-vertical CI reads the jobs API to deep-link the failed-test summary

# Cancel a superseded run when a PR is pushed again; let main-push runs finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  find-verticals:
    uses: ./.github/workflows/tpl-find-verticals.yml
    with:
      type: all
      changed: full
      checkSlns: true

  ci:
    needs: find-verticals
    if: needs.find-verticals.outputs.any == 'true'
    strategy:
      matrix: ${{ fromJson(needs.find-verticals.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/tpl-vertical-ci.yml
    secrets: inherit
    with:
      id: ${{ matrix.id }}
      slug: ${{ matrix.slug }}
      type: ${{ matrix.type }}
      displayName: ${{ matrix.displayName }}
      path: ${{ matrix.path }}
      shortName: ${{ matrix.shortName }}
      name: ${{ matrix.name }}
      sonarProjectKey: ${{ matrix.sonarcloud }}
      sonarProjectName: ${{ matrix.sonarcloudName }}

  # Run-level timing overview. The per-vertical jobs run in parallel, so none of
  # them can see the run as a whole; this final job reads every vertical's timings
  # from the jobs API and writes one rollup (wall-clock / long pole / runner-time /
  # queue + a per-vertical table) to the run summary page. `always()` so it still
  # reports when verticals fail.
  timing-summary:
    needs: [find-verticals, ci]
    if: ${{ always() && needs.find-verticals.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # reads the jobs API to aggregate per-vertical timings
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run-level timing overview
        shell: pwsh
        env:
          GH_API_TOKEN: ${{ github.token }}
        run: |
          & "$env:GITHUB_WORKSPACE/eng/testing/report-run-summary.ps1"
