name: "Template: Vertical CI"

on:
  workflow_call:
    inputs:
      id:
        required: true
        type: string
        description: The ID of the vertical for which to run CI

      slug:
        required: true
        type: string
        description: The slug of the vertical for which to run CI

      type:
        required: true
        type: string
        description: The type of vertical to run CI for

      displayName:
        required: true
        type: string
        description: The display name of the vertical for which to run CI

      path:
        required: true
        type: string
        description: The path to the vertical for which to run CI

      shortName:
        required: true
        type: string
        description: The short name of the vertical for which to run CI

      name:
        required: true
        type: string
        description: The name of the vertical for which to run CI

      sonarProjectKey:
        required: true
        type: string
        description: The SonarCloud project key for the vertical (or false to disable SonarCloud analysis)

      sonarProjectName:
        required: true
        type: string
        description: The SonarCloud project name for the vertical

      analyze:
        required: false
        type: boolean
        default: false
        description: >-
          When true, run the SonarCloud analysis steps. Only the scheduled
          nightly main scan (sonar-nightly.yml) sets this; PR and push-to-main
          CI leave it false, so Sonar never runs on the per-push critical path.

permissions:
  contents: read

jobs:
  build-test-analyze:
    # Single job that builds, tests (with coverage), runs the threshold
    # check, packs (for pkg verticals), and uploads the SonarCloud analysis
    # — all driven by ONE test execution. Previously split across two jobs
    # (`build-and-test` and `analyze`) that each rebuilt and re-ran every
    # test, doubling per-vertical CI minutes. SonarCloud's C# scanner does
    # not accept cobertura, so coverage is collected once into the native
    # `.coverage` binary and merged into both formats: cobertura for the
    # PowerShell threshold check, VSCoverage XML for Sonar.
    name: Build, Test, Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history (fetch-depth 0) only on the analyze (nightly) run,
          # which Sonar needs for blame / SCM authors / "new code" detection;
          # PR/main CI checks out shallow to save clone time. The depths are
          # quoted strings on purpose: an unquoted 0 is falsy in GitHub Actions
          # expressions, so `analyze && 0 || 1` would always evaluate to 1.
          fetch-depth: ${{ inputs.analyze && '0' || '1' }}

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore dotnet workloads
        # Only verticals that contain an Aspire AppHost (currently AccessManagement)
        # need a workload restore; skip the ~20s on every other vertical.
        working-directory: ${{ inputs.path }}
        shell: bash
        run: |
          if grep -rql "Aspire.AppHost.Sdk" --include=*.csproj .; then
            dotnet workload restore
          else
            echo "No Aspire AppHost in this vertical; skipping workload restore."
          fi

      - name: Detect SonarCloud config
        # Single source of truth for "should Sonar run?". Exposed as a step
        # output so the conditional Sonar steps below all reference one
        # condition instead of repeating the checks inline.
        # Sonar runs only when BOTH hold:
        #   - the caller opted in (`analyze == true`) — only the scheduled
        #     nightly main scan (sonar-nightly.yml) does; PR/main CI leaves it
        #     false, so Sonar never runs on the per-push critical path.
        #   - the vertical opted in (`sonarProjectKey != 'false'`).
        # The nightly scan runs against main HEAD, so the fork/bot/PR-author
        # guards the per-push model needed are no longer relevant here.
        id: sonar
        shell: bash
        run: |
          if [[ "${{ inputs.analyze }}" == "true" \
             && "${{ inputs.sonarProjectKey }}" != "false" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        # Required by dotnet-sonarscanner. Skipped when Sonar is disabled
        # for this vertical (e.g. Altinn.Register).
        if: steps.sonar.outputs.enabled == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "microsoft"
          java-version: 17

      - name: Cache SonarCloud scanner and analysis cache
        # Caches both the dotnet-sonarscanner / dotnet-coverage global tools
        # (~80MB) and Sonar's incremental analysis cache under ~/.sonar/cache.
        # Keyed per-vertical so each project's analysis cache is isolated;
        # bumped when the scanner version changes.
        if: steps.sonar.outputs.enabled == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.sonar/cache
            ~/.dotnet/tools
          key: ${{ runner.os }}-sonar-11.2.1-${{ inputs.slug }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-sonar-11.2.1-${{ inputs.slug }}-
            ${{ runner.os }}-sonar-11.2.1-

      - name: Install coverage and Sonar tools
        # dotnet-coverage is needed by every vertical (collects test
        # coverage). dotnet-sonarscanner is only needed when Sonar is on.
        shell: bash
        run: |
          dotnet tool list --global | grep -q dotnet-coverage || dotnet tool install --global dotnet-coverage
          if [[ "${{ steps.sonar.outputs.enabled }}" == "true" ]]; then
            dotnet tool list --global | grep -q dotnet-sonarscanner || dotnet tool install --global dotnet-sonarscanner --version 11.2.1
          fi

      - name: SonarCloud begin
        # Wraps the build/test that follow. The scanner injects its analyzers
        # via MSBuild integration during the Build step; analysis data is
        # then uploaded in the matching `SonarCloud end` step below.
        id: sonar-begin
        if: steps.sonar.outputs.enabled == 'true'
        working-directory: ${{ inputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_KEY: ${{ inputs.sonarProjectKey }}
          SONAR_NAME: ${{ inputs.sonarProjectName }}
        shell: bash
        run: |
          dotnet-sonarscanner begin \
            /key:"$SONAR_KEY" \
            /name:"$SONAR_NAME" \
            /o:"altinn" \
            /d:sonar.token="$SONAR_TOKEN" \
            /s:"$GITHUB_WORKSPACE/SonarQube.Analysis.xml"

      - name: Build
        # `--no-incremental` keeps the output deterministic between this run
        # and any local rebuild — important when the SonarCloud scanner is
        # wrapping the build, which is sensitive to stale analyzer outputs.
        #
        # Collapse the ~900 lines of restore + per-project + analyzer-warning
        # output behind a log group. The full build is captured in build.binlog
        # (uploaded as an artifact on failure), warnings are tracked by
        # SonarCloud, and a build error still fails the step (bash `set -e` exits
        # before `::endgroup::`; GitHub auto-closes the open group).
        id: build
        shell: bash
        run: |
          echo "::group::dotnet build (full output is in build.binlog, uploaded as an artifact on failure)"
          dotnet build -c Release --no-incremental -bl:binlog/build.binlog
          echo "::endgroup::"
        working-directory: ${{ inputs.path }}

      # Tests run in two lanes off the single build above (#3363): a fast unit
      # lane first, then the slower integration lane. xUnit v3 routes through
      # Microsoft Testing Platform (MTP); arguments after `--` go to each
      # per-project MTP runner:
      #   --filter-trait        select the lane by the Category trait
      #   --results-directory   per-lane subdir so the two lanes' .trx / .log
      #                         files don't overwrite each other
      #   --report-xunit-trx    emit .trx (consumed by Sonar via
      #                         sonar.cs.vstest.reportsPaths = **/*.trx)
      #   --ignore-exit-code 8  treat "no tests ran" as success — covers both
      #                         all-[Skip]ped (e.g. Host.Lease without Azurite)
      #                         AND a lane that selects 0 tests in a
      #                         single-type vertical (e.g. PEP has no
      #                         integration tests). Verified: an empty filtered
      #                         run exits 8, which this flag maps to success.
      # Each lane writes its own .coverage file; the Convert steps below merge
      # TestResults/*.coverage into one report, so the threshold gate and Sonar
      # still see whole-suite coverage. `dotnet-coverage collect -- dotnet test`
      # propagates the test exit code, so a real failure (exit 2) fails the step.
      - name: Test - unit lane (with coverage)
        id: test_unit
        shell: bash
        working-directory: ${{ inputs.path }}
        run: |
          dotnet-coverage collect --nologo \
            --settings "$GITHUB_WORKSPACE/eng/testing/coverage.settings" \
            --output TestResults/coverage.unit.coverage --output-format coverage \
            -- dotnet test -c Release --no-build -bl:binlog/test-unit.binlog \
              -- --results-directory TestResults/unit --report-xunit-trx \
                 --filter-trait "Category=Unit" --ignore-exit-code 8

      - name: Test - integration lane (with coverage)
        # Runs even when the unit lane failed (but not when the build failed),
        # so coverage spans the whole suite and the threshold gate is never
        # computed on unit-only data.
        id: test_integration
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        shell: bash
        working-directory: ${{ inputs.path }}
        env:
          # FixtureTiming writes one summary line per test process to this file; the
          # next step prints it into the log. A file is used because MTP / dotnet-
          # coverage swallow the test host's process-exit stdout.
          FIXTURE_TIMING_FILE: ${{ github.workspace }}/fixture-timing.txt
        run: |
          dotnet-coverage collect --nologo \
            --settings "$GITHUB_WORKSPACE/eng/testing/coverage.settings" \
            --output TestResults/coverage.integration.coverage --output-format coverage \
            -- dotnet test -c Release --no-build -bl:binlog/test-integration.binlog \
              -- --results-directory TestResults/integration --report-xunit-trx \
                 --filter-trait "Category=Integration" --ignore-exit-code 8

      - name: Setup-timing breakdown (FixtureTiming)
        # Surface FixtureTiming's per-assembly setup-time breakdown (host build vs DB
        # provisioning vs per-test clone vs one-time template build) directly in this
        # job's log, so where test setup time goes is visible without downloading
        # anything. Informational only; never fails the build. No-op for verticals
        # whose tests do not use the Postgres engine (no file is written).
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        shell: bash
        run: |
          if [[ -s "${{ github.workspace }}/fixture-timing.txt" ]]; then
            echo "::group::FixtureTiming setup-time breakdown (per assembly: <phase>_ms total, <phase>_n runs)"
            cat "${{ github.workspace }}/fixture-timing.txt"
            echo "::endgroup::"
          else
            echo "No FixtureTiming output (this vertical's tests do not use the Postgres engine)."
          fi

      - name: Report failed tests
        # When the Test step fails, surface the specific failing test names
        # (plus their assertion / stack context) directly in the workflow log.
        # The workflow's dotnet-test output otherwise only contains per-DLL
        # summary lines ("Failed: N, Passed: M, ...") — MTP writes the test-
        # level detail to bin/.../TestResults/<Project>_<tfm>_<arch>.log,
        # which this step parses. The same files are uploaded as artifacts by
        # the step below; we mirror the failures into the log (and as
        # ::error:: annotations for the PR checks summary) so reviewers don't
        # need to download the artifact for the most common case.
        if: failure() && (steps.test_unit.conclusion == 'failure' || steps.test_integration.conclusion == 'failure')
        shell: pwsh
        working-directory: ${{ inputs.path }}
        run: |
          # Each lane passes `--results-directory TestResults/<lane>` to MTP,
          # so the per-project logs land under `<vertical>/TestResults/unit/`
          # and `.../integration/` (and, for some configurations, in the
          # per-project `bin/.../TestResults/`). Matching any path that
          # contains a `TestResults/` segment covers all of these while the
          # `*_net10.0_x64.log` filename pattern keeps us on MTP-shaped
          # per-project logs.
          $logs = Get-ChildItem -Path . -Recurse -Filter '*_net10.0_x64.log' -ErrorAction SilentlyContinue |
                  Where-Object { ($_.FullName -replace '\\','/') -match '/TestResults/' }

          if (-not $logs) {
              Write-Host "No MTP per-project logs found in any TestResults/ directory under $(Get-Location)." -ForegroundColor Yellow
              exit 0
          }

          $total = 0
          foreach ($log in $logs) {
              # MTP's per-project log prints a line of the form
              #   failed <Test Display Name> (duration)
              # followed by the assertion message, source location, and stack.
              # We grab each "failed " line plus a bounded block of context.
              # Note: `$matches` is an automatic variable in PowerShell (written
              # by the -match operator), so use a distinct name here.
              $failures = Select-String -Path $log.FullName -Pattern '^\s*failed\s+' -Context 0, 15
              if (-not $failures) { continue }

              Write-Host ""
              Write-Host "::group::Failed tests in $($log.BaseName)"
              foreach ($m in $failures) {
                  $total++
                  $title = ($m.Line -replace '^\s*failed\s+', '').Trim()
                  # Take context up to (but not past) the next "failed " line or
                  # an unrelated xUnit/MTP summary line — whichever comes first.
                  $ctx = @()
                  foreach ($line in $m.Context.PostContext) {
                      if ($line -match '^\s*failed\s+' -or $line -match '^\s*(passed|skipped)\s+' -or $line -match 'Test run summary' -or $line -match 'Tests (failed|succeeded):' ) { break }
                      $ctx += $line
                  }
                  $body = ($ctx -join "`n").TrimEnd()
                  Write-Host "`n  $title"
                  if ($body) { Write-Host $body }

                  # PR-checks annotation (first non-empty context line as message)
                  $msgLine = ($ctx | Where-Object { $_.Trim() } | Select-Object -First 1)
                  if (-not $msgLine) { $msgLine = 'See workflow log / test-results artifact for details.' }
                  $escTitle = $title -replace '%','%25' -replace "`r",'' -replace "`n",' '
                  $escMsg = $msgLine.Trim() -replace '%','%25' -replace "`r",'' -replace "`n",' '
                  Write-Host "::error title=$escTitle::$escMsg"
              }
              Write-Host "::endgroup::"
          }

          Write-Host ""
          Write-Host "Total failing tests: $total"

      - name: Convert coverage to cobertura
        # Merges the per-lane .coverage binaries (unit + integration) written
        # by the Test steps and emits cobertura — the format the PowerShell
        # threshold check below parses. Runs even on test failure so a coverage
        # regression isn't masked by a separate test failure. The glob tolerates
        # a vertical that produced only one lane's file.
        if: always() && hashFiles(format('{0}/TestResults/*.coverage', inputs.path)) != ''
        shell: bash
        working-directory: ${{ inputs.path }}
        run: |
          dotnet-coverage merge --nologo \
            --output TestResults/coverage.cobertura.xml --output-format cobertura \
            TestResults/*.coverage

      - name: Convert coverage to VSCoverage XML
        # Sonar's C# scanner does not accept cobertura — it reads VSCoverage
        # XML via sonar.cs.vscoveragexml.reportsPaths (configured in the
        # repo-root SonarQube.Analysis.xml). Skip when Sonar is off for this
        # vertical (no consumer).
        if: always() && steps.sonar-begin.outcome == 'success' && hashFiles(format('{0}/TestResults/*.coverage', inputs.path)) != ''
        shell: bash
        working-directory: ${{ inputs.path }}
        run: |
          dotnet-coverage merge --nologo \
            --output TestResults/coverage.xml --output-format xml \
            TestResults/*.coverage

      - name: SonarCloud end
        # Uploads analysis to SonarCloud. Runs on test failure too — issues
        # found by the scanner are still useful when tests are red. Gated on
        # `sonar-begin succeeded` so the matching `end` is only invoked when
        # there's something to close out.
        #
        # The scanner emits ~2000 lines of INFO during the upload; collapse it
        # behind a log group so the job log stays readable. The gate result and
        # dashboard link live on the SonarCloud PR check, not here, so nothing
        # useful is hidden. A non-zero `end` still fails the step (bash `set -e`
        # exits before `::endgroup::`; GitHub auto-closes the open group).
        if: always() && steps.sonar-begin.outcome == 'success'
        working-directory: ${{ inputs.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          echo "::group::dotnet-sonarscanner end (full scanner log — expand if needed)"
          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
          echo "::endgroup::"

      - name: Coverage threshold check
        # Parse-only: reads TestResults/coverage.cobertura.xml produced by
        # the Convert-to-cobertura step above and enforces per-assembly
        # thresholds. Completes in seconds — no test re-run.
        # See eng/testing/check-coverage-thresholds.ps1.
        if: always() && hashFiles(format('{0}/TestResults/coverage.cobertura.xml', inputs.path)) != ''
        shell: pwsh
        working-directory: ${{ inputs.path }}
        run: |
          # Prefer a per-vertical thresholds file (colocated with the vertical),
          # fall back to the global one under eng/testing/.
          $localThresholds = Join-Path (Get-Location) 'coverage-thresholds.json'
          $globalThresholds = Join-Path $env:GITHUB_WORKSPACE 'eng/testing/coverage-thresholds.json'
          $thresholdsFile = if (Test-Path $localThresholds) { $localThresholds }
                            elseif (Test-Path $globalThresholds) { $globalThresholds }
                            else { $null }
          if (-not $thresholdsFile) { Write-Host "No thresholds file, skipping"; exit 0 }
          Write-Host "Using thresholds file: $thresholdsFile"
          $cov = Join-Path (Get-Location) 'TestResults/coverage.cobertura.xml'
          & (Join-Path $env:GITHUB_WORKSPACE 'eng/testing/check-coverage-thresholds.ps1') -CoverageFiles $cov -ThresholdsFile $thresholdsFile -OwnedRoot (Get-Location).Path

      - name: Pack
        run: dotnet pack -c Release --no-build -bl:binlog/pack.binlog
        working-directory: ${{ inputs.path }}
        if: inputs.type == 'pkg'

      - name: Upload test results
        # On failure only: capture MTP per-project logs and TRX reports so the
        # cause can be diagnosed from GHA artifacts. The workflow `Test.txt`
        # log contains only summary lines like "Failed: N, Passed: M"; per-test
        # detail lives in bin/.../TestResults/<Project>_<tfm>_<arch>.log.
        # We intentionally skip this on success — the logs aren't needed and
        # uploading them every run added 10+ MB per CI pipeline.
        # Coverage XML is not uploaded (it's reproducible locally via
        # eng/testing/run-coverage.ps1 and was the bulk of the artifact size).
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.slug }}-test-results
          path: |
            ${{ inputs.path }}/**/TestResults/**/*.log
            ${{ inputs.path }}/**/TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 3

      - name: Create binlog artifact
        # Failure-only, mirroring the test-results upload above: the binlog is a
        # debugging aid for a red build/test/pack, so uploading it on every green
        # run just spends upload time and storage for an artifact nobody fetches.
        # `if-no-files-found: ignore` because a failure can occur before any
        # binlog is written (e.g. checkout / setup-dotnet), in which case there's
        # nothing to upload and that's fine.
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.slug }}-binlog
          path: ${{ inputs.path }}/binlog/*.binlog
          if-no-files-found: ignore
          retention-days: 1
