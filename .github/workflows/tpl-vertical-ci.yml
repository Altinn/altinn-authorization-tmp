name: "Template: Vertical CI"

on:
  workflow_call:
    inputs:
      id:
        required: true
        type: string
        description: The ID of the vertical for which to run CI

      slug:
        required: true
        type: string
        description: The slug of the vertical for which to run CI

      type:
        required: true
        type: string
        description: The type of vertical to run CI for

      displayName:
        required: true
        type: string
        description: The display name of the vertical for which to run CI

      path:
        required: true
        type: string
        description: The path to the vertical for which to run CI

      shortName:
        required: true
        type: string
        description: The short name of the vertical for which to run CI

      name:
        required: true
        type: string
        description: The name of the vertical for which to run CI

      sonarProjectKey:
        required: true
        type: string
        description: The SonarCloud project key for the vertical (or false to disable SonarCloud analysis)

      sonarProjectName:
        required: true
        type: string
        description: The SonarCloud project name for the vertical

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dotnet workloads
        run: dotnet workload restore
        working-directory: ${{ inputs.path }}

      - name: Build
        run: dotnet build -c Release -bl:binlog/build.binlog
        working-directory: ${{ inputs.path }}

      - name: Test
        # `--` forwards args to the Microsoft Testing Platform runner used by
        # xUnit v3. Exit code 8 means "no tests ran" (e.g. every test in the
        # vertical is currently `[Skip]`ed because the required infrastructure
        # such as Azurite is unavailable in CI). We don't want that to fail the
        # job; real test failures still exit with code 2.
        id: test
        run: dotnet test -c Release --no-build -bl:binlog/test.binlog -- --ignore-exit-code 8
        working-directory: ${{ inputs.path }}

      - name: Report failed tests
        # When the Test step fails, surface the specific failing test names
        # (plus their assertion / stack context) directly in the workflow log.
        # The workflow's dotnet-test output otherwise only contains per-DLL
        # summary lines ("Failed: N, Passed: M, ...") — MTP writes the test-
        # level detail to bin/.../TestResults/<Project>_<tfm>_<arch>.log,
        # which this step parses. The same files are uploaded as artifacts by
        # the step below; we mirror the failures into the log (and as
        # ::error:: annotations for the PR checks summary) so reviewers don't
        # need to download the artifact for the most common case.
        if: failure() && steps.test.conclusion == 'failure'
        shell: pwsh
        working-directory: ${{ inputs.path }}
        run: |
          $logs = Get-ChildItem -Path . -Recurse -Filter '*_net9.0_x64.log' -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match [regex]::Escape([IO.Path]::Combine('bin','Release','net9.0','TestResults')) }

          if (-not $logs) {
              Write-Host "No MTP per-project logs found under bin/Release/net9.0/TestResults/." -ForegroundColor Yellow
              exit 0
          }

          $total = 0
          foreach ($log in $logs) {
              # MTP's per-project log prints a line of the form
              #   failed <Test Display Name> (duration)
              # followed by the assertion message, source location, and stack.
              # We grab each "failed " line plus a bounded block of context.
              # Note: `$matches` is an automatic variable in PowerShell (written
              # by the -match operator), so use a distinct name here.
              $failures = Select-String -Path $log.FullName -Pattern '^\s*failed\s+' -Context 0, 15
              if (-not $failures) { continue }

              Write-Host ""
              Write-Host "::group::Failed tests in $($log.BaseName)"
              foreach ($m in $failures) {
                  $total++
                  $title = ($m.Line -replace '^\s*failed\s+', '').Trim()
                  # Take context up to (but not past) the next "failed " line or
                  # an unrelated xUnit/MTP summary line — whichever comes first.
                  $ctx = @()
                  foreach ($line in $m.Context.PostContext) {
                      if ($line -match '^\s*failed\s+' -or $line -match '^\s*(passed|skipped)\s+' -or $line -match 'Test run summary' -or $line -match 'Tests (failed|succeeded):' ) { break }
                      $ctx += $line
                  }
                  $body = ($ctx -join "`n").TrimEnd()
                  Write-Host "`n  $title"
                  if ($body) { Write-Host $body }

                  # PR-checks annotation (first non-empty context line as message)
                  $msgLine = ($ctx | Where-Object { $_.Trim() } | Select-Object -First 1)
                  if (-not $msgLine) { $msgLine = 'See workflow log / test-results artifact for details.' }
                  $escTitle = $title -replace '%','%25' -replace "`r",'' -replace "`n",' '
                  $escMsg = $msgLine.Trim() -replace '%','%25' -replace "`r",'' -replace "`n",' '
                  Write-Host "::error title=$escTitle::$escMsg"
              }
              Write-Host "::endgroup::"
          }

          Write-Host ""
          Write-Host "Total failing tests: $total"

      - name: Coverage threshold check
        if: hashFiles(format('{0}/**/test/**/*.Tests.csproj', inputs.path)) != ''
        shell: pwsh
        working-directory: ${{ inputs.path }}
        run: |
          # Prefer a per-vertical thresholds file (colocated with the vertical),
          # fall back to the global one under eng/testing/.
          $localThresholds = Join-Path (Get-Location) 'coverage-thresholds.json'
          $globalThresholds = Join-Path $env:GITHUB_WORKSPACE 'eng/testing/coverage-thresholds.json'
          $thresholdsFile = if (Test-Path $localThresholds) { $localThresholds }
                            elseif (Test-Path $globalThresholds) { $globalThresholds }
                            else { $null }
          if (-not $thresholdsFile) { Write-Host "No thresholds file, skipping"; exit 0 }
          Write-Host "Using thresholds file: $thresholdsFile"
          dotnet tool install -g dotnet-coverage 2>$null
          $testProjs = Get-ChildItem -Path . -Filter '*.Tests.csproj' -Recurse | Select-Object -ExpandProperty FullName
          if ($testProjs.Count -eq 0) { Write-Host "No test projects found, skipping"; exit 0 }
          & (Join-Path $env:GITHUB_WORKSPACE 'eng/testing/run-coverage.ps1') -Projects $testProjs -NoBuild -ThresholdsFile $thresholdsFile

      - name: Pack
        run: dotnet pack -c Release --no-build -bl:binlog/pack.binlog
        working-directory: ${{ inputs.path }}
        if: inputs.type == 'pkg'

      - name: Upload test results
        # On failure only: capture MTP per-project logs, TRX reports and
        # coverage-run logs so the cause can be diagnosed from GHA artifacts.
        # The workflow `6_Test.txt` log contains only summary lines like
        # "Failed: N, Passed: M"; the coverage step redirects per-project test
        # stdout to files under <repoRoot>/TestResults to keep its own log
        # readable. We intentionally skip this on success — the logs aren't
        # needed and uploading them every run added 10+ MB per CI pipeline.
        # Cobertura XML is not uploaded (it's reproducible locally via
        # eng/testing/run-coverage.ps1 and was the bulk of the artifact size).
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.slug }}-test-results
          path: |
            ${{ inputs.path }}/**/TestResults/*.log
            ${{ inputs.path }}/**/TestResults/*.trx
            TestResults/*.coverage.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Create binlog artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.slug }}-binlog
          path: ${{ inputs.path }}/binlog/*.binlog
          if-no-files-found: error
          retention-days: 1

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    if: inputs.sonarProjectKey != 'false' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dotnet workloads
        run: dotnet workload restore
        working-directory: ${{ inputs.path }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "microsoft"
          java-version: 17

      - name: Install SonarCloud scanner and dependencies
        shell: bash
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Analyze
        working-directory: ${{ inputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_KEY: ${{ inputs.sonarProjectKey }}
          SONAR_NAME: ${{ inputs.sonarProjectName }}
        shell: bash
        run: |
          dotnet-sonarscanner begin \
            /key:"$SONAR_KEY" \
            /name:"$SONAR_NAME" \
            /o:"altinn" /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.project.monorepo.enabled=true \
            /d:sonar.exclusions="**/Migration/**,**/Altinn.AccessMgmt.FFB/**,**/Altinn.AccessMgmt.WebComponents/**" \
            /d:sonar.coverage.exclusions="**/Migration/**,**/Altinn.AccessMgmt.FFB/**,**/Altinn.AccessMgmt.WebComponents/**" \
            /d:sonar.test.exclusions="**/test/**/*" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.vstest.reportsPaths="**/*.trx" \
            /d:sonar.cs.vscoveragexml.reportsPaths="TestResults/coverage.xml"

          dotnet build --no-incremental
          # xUnit v3 routes `dotnet test` through Microsoft Testing Platform (MTP).
          # Everything after `--` is forwarded to each per-project MTP runner:
          #   --results-directory   emit artifacts (including the TRX below) under TestResults/
          #   --report-xunit-trx    generate .trx files so Sonar's sonar.cs.vstest.reportsPaths picks them up
          #                         (xUnit v3's built-in TRX reporter; the generic MTP
          #                         --report-trx would need the separate
          #                         Microsoft.Testing.Extensions.TrxReport package)
          #   --ignore-exit-code 8  treat "all tests [Skip]ped" (e.g. Host.Lease without Azurite) as success
          dotnet coverage collect 'dotnet test --no-build -- --results-directory TestResults/ --report-xunit-trx --ignore-exit-code 8' \
            -f xml -o 'TestResults/coverage.xml'

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
