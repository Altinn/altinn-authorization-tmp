name: "Template: Vertical CI"

on:
  workflow_call:
    inputs:
      id:
        required: true
        type: string
        description: The ID of the vertical for which to run CI

      slug:
        required: true
        type: string
        description: The slug of the vertical for which to run CI

      type:
        required: true
        type: string
        description: The type of vertical to run CI for

      displayName:
        required: true
        type: string
        description: The display name of the vertical for which to run CI

      path:
        required: true
        type: string
        description: The path to the vertical for which to run CI

      shortName:
        required: true
        type: string
        description: The short name of the vertical for which to run CI

      name:
        required: true
        type: string
        description: The name of the vertical for which to run CI

      sonarProjectKey:
        required: true
        type: string
        description: The SonarCloud project key for the vertical (or false to disable SonarCloud analysis)

      sonarProjectName:
        required: true
        type: string
        description: The SonarCloud project name for the vertical

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dotnet workloads
        run: dotnet workload restore
        working-directory: ${{ inputs.path }}

      - name: Build
        run: dotnet build -c Release -bl:binlog/build.binlog
        working-directory: ${{ inputs.path }}

      - name: Test
        # `--` forwards args to the Microsoft Testing Platform runner used by
        # xUnit v3. Exit code 8 means "no tests ran" (e.g. every test in the
        # vertical is currently `[Skip]`ed because the required infrastructure
        # such as Azurite is unavailable in CI). We don't want that to fail the
        # job; real test failures still exit with code 2.
        run: dotnet test -c Release --no-build -bl:binlog/test.binlog -- --ignore-exit-code 8
        working-directory: ${{ inputs.path }}

      - name: Coverage threshold check
        if: hashFiles(format('{0}/**/test/**/*.Tests.csproj', inputs.path)) != ''
        shell: pwsh
        working-directory: ${{ inputs.path }}
        run: |
          # Prefer a per-vertical thresholds file (colocated with the vertical),
          # fall back to the global one under eng/testing/.
          $localThresholds = Join-Path (Get-Location) 'coverage-thresholds.json'
          $globalThresholds = Join-Path $env:GITHUB_WORKSPACE 'eng/testing/coverage-thresholds.json'
          $thresholdsFile = if (Test-Path $localThresholds) { $localThresholds }
                            elseif (Test-Path $globalThresholds) { $globalThresholds }
                            else { $null }
          if (-not $thresholdsFile) { Write-Host "No thresholds file, skipping"; exit 0 }
          Write-Host "Using thresholds file: $thresholdsFile"
          dotnet tool install -g dotnet-coverage 2>$null
          $testProjs = Get-ChildItem -Path . -Filter '*.Tests.csproj' -Recurse | Select-Object -ExpandProperty FullName
          if ($testProjs.Count -eq 0) { Write-Host "No test projects found, skipping"; exit 0 }
          & (Join-Path $env:GITHUB_WORKSPACE 'eng/testing/run-coverage.ps1') -Projects $testProjs -NoBuild -ThresholdsFile $thresholdsFile

      - name: Pack
        run: dotnet pack -c Release --no-build -bl:binlog/pack.binlog
        working-directory: ${{ inputs.path }}
        if: inputs.type == 'pkg'

      - name: Upload test results
        # Capture MTP per-project logs and TRX reports so test failures can be
        # diagnosed from GHA artifacts (the `6_Test.txt` workflow log only
        # contains summary lines like "Failed: N, Passed: M").
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.slug }}-test-results
          path: |
            ${{ inputs.path }}/**/TestResults/*.log
            ${{ inputs.path }}/**/TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 7

      - name: Create binlog artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.slug }}-binlog
          path: ${{ inputs.path }}/binlog/*.binlog
          if-no-files-found: error
          retention-days: 1

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    if: inputs.sonarProjectKey != 'false' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true)

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dotnet workloads
        run: dotnet workload restore
        working-directory: ${{ inputs.path }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "microsoft"
          java-version: 17

      - name: Install SonarCloud scanner and dependencies
        shell: bash
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Analyze
        working-directory: ${{ inputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_KEY: ${{ inputs.sonarProjectKey }}
          SONAR_NAME: ${{ inputs.sonarProjectName }}
        shell: bash
        run: |
          dotnet-sonarscanner begin \
            /key:"$SONAR_KEY" \
            /name:"$SONAR_NAME" \
            /o:"altinn" /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.scanner.scanAll=false \
            /d:sonar.project.monorepo.enabled=true \
            /d:sonar.exclusions="**/Migration/**,**/Altinn.AccessMgmt.FFB/**,**/Altinn.AccessMgmt.WebComponents/**" \
            /d:sonar.coverage.exclusions="**/Migration/**,**/Altinn.AccessMgmt.FFB/**,**/Altinn.AccessMgmt.WebComponents/**" \
            /d:sonar.test.exclusions="**/test/**/*" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.vstest.reportsPaths="**/*.trx" \
            /d:sonar.cs.vscoveragexml.reportsPaths="TestResults/coverage.xml"

          dotnet build --no-incremental
          # xUnit v3 routes `dotnet test` through Microsoft Testing Platform (MTP).
          # Everything after `--` is forwarded to each per-project MTP runner:
          #   --results-directory   emit artifacts (including the TRX below) under TestResults/
          #   --report-xunit-trx    generate .trx files so Sonar's sonar.cs.vstest.reportsPaths picks them up
          #                         (xUnit v3's built-in TRX reporter; the generic MTP
          #                         --report-trx would need the separate
          #                         Microsoft.Testing.Extensions.TrxReport package)
          #   --ignore-exit-code 8  treat "all tests [Skip]ped" (e.g. Host.Lease without Azurite) as success
          dotnet coverage collect 'dotnet test --no-build -- --results-directory TestResults/ --report-xunit-trx --ignore-exit-code 8' \
            -f xml -o 'TestResults/coverage.xml'

          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
